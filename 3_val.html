    <main class="main-content">
        <h1>Курс индонезийской рупии (IDR)</h1>
        <p><a href="https://www.cbr-xml-daily.ru/" target="_blank">Данные с cbr-xml-daily.ru</a></p>

        <div id="rateBlock" class="val-card"></div>

        <div class="val-card">
            <h3>Конвертер валют</h3>
            <div class="converter">
                <div class="converter-box">
                    <label>Рубли (RUB)</label>
                    <input type="number" id="rubInput" placeholder="Сумма в рублях" value="0">
                </div>
                <div class="converter-box">
                    <label>Индонезийские рупии (IDR)</label>
                    <input type="number" id="idrInput" placeholder="Сумма в рупиях" value="0">
                </div>
            </div>
        </div>

        <div class="val-card">
            <h3>Динамика курса IDR за последние 30 дней</h3>
            <div class="diagram-container">
                <div id="diagram" class="diagram"></div>
            </div>
            <div id="infoBlock" class="info-block">
                Кликните на любой столбец, чтобы увидеть дату и курс
            </div>
        </div>
